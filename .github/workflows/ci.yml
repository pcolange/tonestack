name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure (warnings as errors)
        run: cmake --preset ci

      - name: Build
        run: cmake --build build/ci --config Release

      - name: Test
        run: ctest --preset ci --build-config Release --output-on-failure

  compiler:
    name: compiler (python checks + codegen integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up circuitc venv
        run: |
          python3 -m venv compiler/.venv
          compiler/.venv/bin/pip install -e 'compiler[dev]'

      - name: Python checks
        working-directory: compiler
        run: |
          .venv/bin/python -m pytest
          .venv/bin/ruff check .
          .venv/bin/pyright

      - name: Configure (codegen enabled)
        run: cmake --preset ci

      - name: Build
        run: cmake --build build/ci --config Release

      - name: Test (includes golden_coeffs)
        run: ctest --preset ci --build-config Release --output-on-failure
